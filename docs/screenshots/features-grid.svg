  <text x="717" y="309" font-family="Arial, sans-serif" font-size="8" fill="#6ee7b7" text-anchor="middle">Up to 4 Standards</text>

  <!-- Bottom label -->
  <text x="450" y="346" font-family="Arial, sans-serif" font-size="10" fill="#334155" text-anchor="middle">BIS AI  |  Team Tech_Bridgers  |  Hackathon 2026</text>
</svg>
