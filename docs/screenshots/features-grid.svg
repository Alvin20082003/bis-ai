  <text x="36" y="260" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Change location: coastal,</text>
  <text x="36" y="274" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">seismic, urban. Change</text>
  <text x="36" y="288" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">industry type.</text>
  <rect x="36" y="298" width="130" height="14" rx="7" fill="#06b6d415"/>
