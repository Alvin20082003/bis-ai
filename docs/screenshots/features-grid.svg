<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <rect width="900" height="360" fill="url(#bg)" rx="14"/>

  <text x="450" y="34" font-family="Arial Black, Arial, sans-serif" font-size="17" font-weight="900" fill="white" text-anchor="middle">Key Features</text>
  <text x="450" y="52" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Everything an MSE needs for BIS compliance</text>

  <!-- Row 1 -->

  <!-- Card 1: Smart Search -->
  <rect x="20" y="66" width="200" height="120" rx="10" fill="#0d1424" stroke="#3b82f625" stroke-width="1.5"/>
  <rect x="20" y="66" width="200" height="3" rx="2" fill="#3b82f6"/>
  <text x="36" y="92" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white">Smart Search</text>
  <text x="36" y="108" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#60a5fa">Hybrid RAG</text>
  <text x="36" y="124" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Type any product description.</text>
  <text x="36" y="138" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Get top BIS standards with</text>
  <text x="36" y="152" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">relevance scores instantly.</text>
  <rect x="36" y="162" width="80" height="14" rx="7" fill="#3b82f615"/>
  <text x="76" y="173" font-family="Arial, sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">FAISS + BM25</text>

  <!-- Card 2: AI Rationale -->
  <rect x="232" y="66" width="200" height="120" rx="10" fill="#0d1424" stroke="#8b5cf625" stroke-width="1.5"/>
  <rect x="232" y="66" width="200" height="3" rx="2" fill="#8b5cf6"/>
  <text x="248" y="92" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white">AI Rationale</text>
  <text x="248" y="108" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#a78bfa">Gemini 2.5 Flash</text>
  <text x="248" y="124" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Explains WHY each standard</text>
  <text x="248" y="138" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">applies to YOUR specific</text>
  <text x="248" y="152" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">product. Not generic advice.</text>
  <rect x="248" y="162" width="90" height="14" rx="7" fill="#8b5cf615"/>
  <text x="293" y="173" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa" text-anchor="middle">Product-specific</text>

  <!-- Card 3: Gap Analysis -->
  <rect x="444" y="66" width="200" height="120" rx="10" fill="#0d1424" stroke="#22c55e25" stroke-width="1.5"/>
