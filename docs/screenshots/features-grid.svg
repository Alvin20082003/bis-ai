  <text x="248" y="274" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">standards, gap analysis,</text>
  <text x="248" y="288" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">checklists and risk summary.</text>
