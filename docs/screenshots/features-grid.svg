  <text x="672" y="228" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white">Compare Standards</text>
  <text x="672" y="244" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#6ee7b7">Side by Side</text>
  <text x="672" y="260" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Compare up to 4 standards</text>
  <text x="672" y="274" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">side by side. Strength, scope,</text>
  <text x="672" y="288" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">testing, applicability.</text>
