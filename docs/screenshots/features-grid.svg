  <!-- Row 2 -->

  <!-- Card 5: What-If -->
  <rect x="20" y="202" width="200" height="120" rx="10" fill="#0d1424" stroke="#06b6d425" stroke-width="1.5"/>
  <rect x="20" y="202" width="200" height="3" rx="2" fill="#06b6d4"/>
