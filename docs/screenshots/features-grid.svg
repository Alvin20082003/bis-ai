  <text x="460" y="244" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#c4b5fd">30+ Standards</text>
  <text x="460" y="260" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Browse all indexed BIS</text>
  <text x="460" y="274" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">standards. Full scope, testing</text>
  <text x="460" y="288" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">methods, related standards.</text>
  <rect x="460" y="298" width="120" height="14" rx="7" fill="#a78bfa15"/>
