  <text x="672" y="138" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">standard. Interactive boxes.</text>
  <text x="672" y="152" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Track your progress.</text>
