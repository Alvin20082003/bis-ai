<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="url(#bg)" rx="14"/>

  <!-- Title -->
  <text x="450" y="34" font-family="Arial Black, Arial, sans-serif" font-size="17" font-weight="900" fill="white" text-anchor="middle">BIS AI Pipeline</text>
  <text x="450" y="52" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">How your product description becomes BIS standards in seconds</text>

  <!-- STEP 1: User Query -->
  <rect x="20" y="72" width="148" height="76" rx="10" fill="#1e293b" stroke="#3b82f640" stroke-width="1.5"/>
  <rect x="20" y="72" width="148" height="4" rx="2" fill="url(#blue)"/>
  <text x="94" y="96" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#60a5fa" text-anchor="middle">1  USER QUERY</text>
  <text x="94" y="112" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">"OPC 53 cement for</text>
  <text x="94" y="126" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">high rise building"</text>
  <text x="94" y="141" font-family="Arial, sans-serif" font-size="8" fill="#475569" text-anchor="middle">Plain language input</text>

  <!-- Arrow 1 to 2 -->
  <line x1="168" y1="110" x2="192" y2="110" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- STEP 2: BIS AI Expansion -->
  <rect x="194" y="72" width="168" height="76" rx="10" fill="#1e293b" stroke="#8b5cf640" stroke-width="1.5"/>
  <rect x="194" y="72" width="168" height="4" rx="2" fill="url(#purple)"/>
  <text x="278" y="96" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#a78bfa" text-anchor="middle">2  BIS AI EXPANSION</text>
  <text x="278" y="112" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Adds: IS 269 IS 12269 OPC</text>
  <text x="278" y="124" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">compressive strength fineness</text>
  <text x="278" y="136" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">soundness BIS compliance...</text>
  <text x="278" y="141" font-family="Arial, sans-serif" font-size="8" fill="#475569" text-anchor="middle"> </text>

  <!-- Arrow 2 splits to 3a and 3b -->
  <line x1="362" y1="110" x2="386" y2="110" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- STEP 3a: FAISS -->
  <rect x="388" y="68" width="148" height="58" rx="10" fill="#1e293b" stroke="#3b82f640" stroke-width="1.5"/>
  <rect x="388" y="68" width="148" height="4" rx="2" fill="url(#blue)"/>
  <text x="462" y="90" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#60a5fa" text-anchor="middle">3  FAISS SEARCH</text>
  <text x="462" y="106" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Semantic  70% weight</text>
  <text x="462" y="120" font-family="Arial, sans-serif" font-size="8" fill="#475569" text-anchor="middle">384-dim AI embeddings</text>

  <!-- STEP 3b: BM25 -->
  <rect x="388" y="138" width="148" height="58" rx="10" fill="#1e293b" stroke="#06b6d440" stroke-width="1.5"/>
  <rect x="388" y="138" width="148" height="4" rx="2" fill="#06b6d4"/>
  <text x="462" y="160" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#22d3ee" text-anchor="middle">4  BM25 SEARCH</text>
  <text x="462" y="176" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Keyword  30% weight</text>
  <text x="462" y="190" font-family="Arial, sans-serif" font-size="8" fill="#475569" text-anchor="middle">Exact term matching</text>

  <!-- Arrows from 3a and 3b to 5 -->
  <line x1="536" y1="97" x2="566" y2="115" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="536" y1="167" x2="566" y2="149" stroke="#06b6d4" stroke-width="1.5"/>

  <!-- STEP 5: Hybrid Fusion -->
  <rect x="568" y="72" width="148" height="76" rx="10" fill="#1e293b" stroke="#22c55e40" stroke-width="1.5"/>
  <rect x="568" y="72" width="148" height="4" rx="2" fill="url(#green)"/>
  <text x="642" y="96" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4ade80" text-anchor="middle">5  HYBRID FUSION</text>
  <text x="642" y="112" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">0.7 x FAISS + 0.3 x BM25</text>
  <text x="642" y="126" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Ranked by combined score</text>
  <text x="642" y="140" font-family="Arial, sans-serif" font-size="8" fill="#475569" text-anchor="middle">Top-5 standards selected</text>

  <!-- Arrow 5 to 6 -->
  <line x1="716" y1="110" x2="740" y2="110" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- STEP 6: Gemini -->
  <rect x="742" y="72" width="140" height="76" rx="10" fill="#1e293b" stroke="#f59e0b40" stroke-width="1.5"/>
  <rect x="742" y="72" width="140" height="4" rx="2" fill="url(#orange)"/>
  <text x="812" y="93" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#fbbf24" text-anchor="middle">6  GEMINI 2.5</text>
  <text x="812" y="107" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">"IS 12269:2013 applies</text>
  <text x="812" y="119" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">because it covers 53</text>
  <text x="812" y="131" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">grade OPC for high-rise</text>
  <text x="812" y="143" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">buildings..."</text>

  <!-- Arrow down to results -->
  <line x1="450" y1="210" x2="450" y2="232" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>

  <!-- Results section -->
  <rect x="20" y="234" width="860" height="110" rx="10" fill="#0d1424" stroke="#3b82f620" stroke-width="1.5"/>
  <text x="450" y="256" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle">RESULTS</text>

  <!-- Result 1 -->
  <rect x="40" y="264" width="255" height="64" rx="8" fill="#1e293b" stroke="#3b82f630" stroke-width="1"/>
  <text x="55" y="283" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#60a5fa">#1  IS 12269:2013</text>
  <text x="55" y="298" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">53 Grade Ordinary Portland Cement</text>
  <text x="55" y="312" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">100% match</text>
  <rect x="230" y="268" width="52" height="16" rx="8" fill="#22c55e20" stroke="#22c55e40" stroke-width="1"/>
  <text x="256" y="280" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#4ade80" text-anchor="middle">HIGH</text>

  <!-- Result 2 -->
  <rect x="322" y="264" width="255" height="64" rx="8" fill="#1e293b" stroke="#8b5cf630" stroke-width="1"/>
  <text x="337" y="283" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#a78bfa">#2  IS 269:2015</text>
  <text x="337" y="298" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Ordinary Portland Cement</text>
  <text x="337" y="312" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">90% match</text>

  <!-- Result 3 -->
  <rect x="604" y="264" width="255" height="64" rx="8" fill="#1e293b" stroke="#06b6d430" stroke-width="1"/>
  <text x="619" y="283" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#22d3ee">#3  IS 8112:2013</text>
  <text x="619" y="298" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">43 Grade Ordinary Portland Cement</text>
  <text x="619" y="312" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">85% match</text>

  <!-- Timing badge -->
  <rect x="350" y="358" width="200" height="22" rx="11" fill="#3b82f610" stroke="#3b82f630" stroke-width="1"/>
  <text x="450" y="373" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle">Total time: ~1.9 seconds</text>
</svg>
