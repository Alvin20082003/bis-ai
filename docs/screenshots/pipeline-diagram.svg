<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="white" text-anchor="middle">🚀 Antigravity AI Pipeline</text>
  <text x="450" y="58" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">How your product description becomes BIS standards in seconds</text>

  <!-- Step 1: User Input -->
  <rect x="30" y="80" width="160" height="80" rx="12" fill="#1e293b" stroke="#3b82f640" stroke-width="1.5"/>
  <rect x="30" y="80" width="160" height="4" rx="2" fill="url(#blue)"/>
  <text x="110" y="112" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#60a5fa" text-anchor="middle">① USER QUERY</text>
  <text x="110" y="130" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">"OPC 53 cement for</text>
  <text x="110" y="146" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">high rise building"</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="120" x2="218" y2="120" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Step 2: Antigravity -->
  <rect x="220" y="80" width="180" height="80" rx="12" fill="#1e293b" stroke="#8b5cf640" stroke-width="1.5"/>
  <rect x="220" y="80" width="180" height="4" rx="2" fill="url(#purple)"/>
  <text x="310" y="108" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">② ANTIGRAVITY EXPANSION</text>
  <text x="310" y="126" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Adds: "IS 269 IS 12269 OPC</text>
  <text x="310" y="140" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">compressive strength fineness</text>
  <text x="310" y="154" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">soundness BIS compliance..."</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="120" x2="428" y2="120" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Step 3: Split into FAISS + BM25 -->
  <rect x="430" y="70" width="150" height="60" rx="12" fill="#1e293b" stroke="#3b82f640" stroke-width="1.5"/>
  <rect x="430" y="70" width="150" height="4" rx="2" fill="url(#blue)"/>
  <text x="505" y="96" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#60a5fa" text-anchor="middle">③ FAISS SEARCH</text>
  <text x="505" y="112" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Semantic (70%)</text>
  <text x="505" y="126" font-family="Arial, sans-serif" font-size="9" fill="#475569" text-anchor="middle">384-dim embeddings</text>

  <rect x="430" y="145" width="150" height="60" rx="12" fill="#1e293b" stroke="#06b6d440" stroke-width="1.5"/>
  <rect x="430" y="145" width="150" height="4" rx="2" fill="#06b6d4"/>
  <text x="505" y="171" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" text-anchor="middle">④ BM25 SEARCH</text>
  <text x="505" y="187" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Keyword (30%)</text>
  <text x="505" y="201" font-family="Arial, sans-serif" font-size="9" fill="#475569" text-anchor="middle">Exact term matching</text>

  <!-- Arrows to fusion -->
  <line x1="580" y1="100" x2="618" y2="120" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="580" y1="175" x2="618" y2="155" stroke="#06b6d4" stroke-width="1.5"/>

  <!-- Step 4: Fusion -->
  <rect x="620" y="80" width="140" height="80" rx="12" fill="#1e293b" stroke="#22c55e40" stroke-width="1.5"/>
  <rect x="620" y="80" width="140" height="4" rx="2" fill="url(#green)"/>
  <text x="690" y="108" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4ade80" text-anchor="middle">⑤ HYBRID FUSION</text>
  <text x="690" y="126" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">0.7×FAISS + 0.3×BM25</text>
  <text x="690" y="142" font-family="Arial, sans-serif" font-size="9" fill="#475569" text-anchor="middle">Ranked by combined score</text>
  <text x="690" y="156" font-family="Arial, sans-serif" font-size="9" fill="#475569" text-anchor="middle">Top-5 standards selected</text>

  <!-- Arrow down to Gemini -->
  <line x1="690" y1="160" x2="690" y2="188" stroke="#22c55e" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Step 5: Gemini -->
  <rect x="560" y="190" width="260" height="80" rx="12" fill="#1e293b" stroke="#f59e0b40" stroke-width="1.5"/>
  <rect x="560" y="190" width="260" height="4" rx="2" fill="url(#orange)"/>
  <text x="690" y="218" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">⑥ GEMINI 2.5 FLASH RATIONALE</text>
  <text x="690" y="236" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">"IS 12269:2013 is applicable because it specifically</text>
  <text x="690" y="250" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">covers 53 grade OPC, ideal for high-rise buildings</text>
  <text x="690" y="264" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">due to higher early strength gain..."</text>

  <!-- Final output box -->
  <rect x="30" y="300" width="840" height="90" rx="12" fill="#0d1424" stroke="#3b82f620" stroke-width="1.5"/>
  <text x="450" y="325" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle">✅ RESULTS</text>

  <!-- Result 1 -->
  <rect x="50" y="335" width="240" height="40" rx="8" fill="#1e293b" stroke="#3b82f630" stroke-width="1"/>
  <text x="60" y="352" font-family="monospace" font-size="10" font-weight="700" fill="#60a5fa">#1  IS 12269:2013</text>
  <text x="60" y="367" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">53 Grade OPC · 100% match · High</text>
  <rect x="255" y="338" width="28" height="14" rx="4" fill="#22c55e20"/>
  <text x="269" y="349" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#4ade80" text-anchor="middle">HIGH</text>

  <!-- Result 2 -->
  <rect x="310" y="335" width="240" height="40" rx="8" fill="#1e293b" stroke="#8b5cf630" stroke-width="1"/>
  <text x="320" y="352" font-family="monospace" font-size="10" font-weight="700" fill="#a78bfa">#2  IS 269:2015</text>
  <text x="320" y="367" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Ordinary Portland Cement · 90%</text>

  <!-- Result 3 -->
  <rect x="570" y="335" width="240" height="40" rx="8" fill="#1e293b" stroke="#06b6d430" stroke-width="1"/>
  <text x="580" y="352" font-family="monospace" font-size="10" font-weight="700" fill="#22d3ee">#3  IS 8112:2013</text>
  <text x="580" y="367" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">43 Grade OPC · 85% match</text>

  <!-- Arrow from Gemini to output -->
  <line x1="450" y1="270" x2="450" y2="298" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Timing badge -->
  <rect x="380" y="395" width="140" height="20" rx="10" fill="#3b82f610" stroke="#3b82f630" stroke-width="1"/>
  <text x="450" y="409" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle">⏱ Total: ~1.9 seconds</text>
</svg>
